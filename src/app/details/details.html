@if(flight()) {
<div class="details-wrapper">
    <mat-card class="details-card">
        <mat-card-content>
            <img [src]="utils.getImageUrl(flight()!)" class="details-img">
        </mat-card-content>
    </mat-card>
    <mat-card class="details-card">
        <mat-card-content>
            <ul>
                <li><strong>ID:</strong> {{flight()?.id}}</li>
                <li><strong>Destination:</strong> {{flight()?.destination}}</li>
                <li><strong>Scheduled At:</strong> {{flight()?.scheduledAt}}</li>
                <li><strong>Plane Model:</strong> {{flight()?.plane}}</li>
                <li><strong>Terminal:</strong> {{flight()?.terminal}}</li>
            </ul>
        </mat-card-content>
    </mat-card>
    <mat-card>
        <mat-card-content>
            <iframe width="100%" height="400" style="border:0" loading="lazy" allowfullscreen
                referrerpolicy="no-referrer-when-downgrade" [src]="getMapUrl(flight()!.destination)">
            </iframe>
        </mat-card-content>
    </mat-card>
</div>


}
